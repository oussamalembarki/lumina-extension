<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 180px; padding: 15px; background: #121212; color: white; font-family: sans-serif; text-align: center; }
    h2 { font-size: 14px; margin-bottom: 15px; letter-spacing: 1px; }
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #3ea6ff; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <h2>STUDYTUBE</h2>
  <label class="switch">
    <input type="checkbox" id="toggleBtn">
    <span class="slider"></span>
  </label>
  <div id="statusText" style="font-size:10px; margin-top:10px; color:#aaa;">OFF</div>
  <script src="popup.js"></script>
</body>
</html>
